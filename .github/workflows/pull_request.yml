name: Build and Test

on:
  pull_request:
    types:
      [opened, synchronize]
    drafts: false
    
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    container:
      image: garrettluskey/bannerlordcoop:latest
      
    steps:
      - name: Checkout Repo
        run: |
          git clone https://github.com/${{ github.repository }}
          cd BannerlordCoop
          git fetch origin "pull/${{ github.event.number }}/head:${{ github.event.pull_request.base.ref }}-PR-${{ github.event.number }}"
          git checkout "${{ github.event.pull_request.base.ref }}-PR-${{ github.event.number }}"

      - name: Link Game Assemblies Folder
        run: |
          ln -s /home/mb2 BannerlordCoop
          
      # CoopTests.slnf contains the test projects that can build and run on Linux (plus their
      # production dependencies such as Coop.Core and GameInterface). The full solution includes
      # legacy net472 projects (Coop, Missions, ClientDebug, MissionTestMod and the
      # Missions-dependent MissionTests) that require Windows.
      - name: Build Solution
        run: |
          cd BannerlordCoop/source
          dotnet build CoopTests.slnf -c Release

      - name: Run Unit Tests
        run: |
          cd BannerlordCoop/source
          dotnet test CoopTests.slnf -c Release --no-build --consoleLoggerParameters:ErrorsOnly
